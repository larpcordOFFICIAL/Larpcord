<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Larpcord</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-body">
  <div class="app-container">

    <div class="server-rail">
      <div class="rail-icon rail-home" title="Larpcord">L</div>
      <div class="rail-icon rail-add" id="rail-add-btn" title="Servers coming soon">+</div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">Friends</div>

      <div class="add-friend-box">
        <input type="text" id="add-friend-input" placeholder="Add friend by username">
        <button id="add-friend-btn">Add</button>
      </div>
      <p id="add-friend-message"></p>

      <div id="requests-section" class="requests-section" style="display:none;">
        <div class="section-label">Friend Requests</div>
        <div id="requests-list"></div>
      </div>

      <div class="section-label">All Friends</div>
      <div id="friends-list" class="friends-list">
        <p class="empty-sub">No friends yet. Add some above!</p>
      </div>

      <div class="profile-bar">
        <div class="avatar-circle" id="my-avatar"></div>
        <div class="profile-info">
          <div class="profile-name" id="my-username">Loading...</div>
          <div class="profile-status"><span class="status-dot"></span>Online</div>
        </div>
        <button id="logout-btn" title="Log out">⏻</button>
      </div>
    </div>

    <div class="main-area">
      <div class="empty-main">
        <div class="empty-logo">Larpcord</div>
        <p>Add friends to start chatting</p>
      </div>
    </div>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
