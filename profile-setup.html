<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Larpcord - Set Up Your Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-box">
    <h1 class="logo-small">Welcome!</h1>
    <p class="subtitle">Pick a username for Larpcord</p>
    <input type="text" id="username" placeholder="Username" maxlength="20">
    <div class="button-row">
      <button id="save-btn">Continue</button>
    </div>
    <p id="message"></p>
  </div>
  <script type="module" src="profile-setup.js"></script>
</body>
</html>
